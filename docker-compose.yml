version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: chat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8000
      JWT_SECRET: dnvsavkkjvsdjkvjsdvsdkvnsdkjn
      JWT_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: dr7oleeqy
      CLOUDINARY_API_KEY: 817719924457297
      CLOUDINARY_API_SECRET: 92tlk4EiLNNzaM52bfmKj0UEIlE
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
